name: Deploy Backend (.NET API)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./backend/TodoApi/TodoApi.csproj

      - name: Build
        run: dotnet build ./backend/TodoApi/TodoApi.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./backend/TodoApi/TodoApi.csproj -c Release -o publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: todolistapi
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
